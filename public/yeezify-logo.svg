  <text x="60" y="62" text-anchor="middle" dominant-baseline="middle" font-family="Bebas Neue, sans-serif" font-size="48" fill="url(#goldGrad)">Y</text>

  <text x="120" y="50" font-family="Bebas Neue, sans-serif" font-size="38" fill="#F7D96E">YeeZify</text>
